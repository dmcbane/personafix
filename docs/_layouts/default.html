<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    /* -- Reset & Base -- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #111827;
      --bg-card: #151d2e;
      --bg-card-hover: #1a2438;
      --border: #1e3a5f;
      --text-primary: #c8d6e5;
      --text-secondary: #6b7d95;
      --text-heading: #e2e8f0;
      --accent-green: #39ff6e;
      --accent-green-dim: #1a8c3c;
      --accent-blue: #00b4d8;
      --accent-purple: #7c3aed;
      --glow-green: 0 0 20px rgba(57, 255, 110, 0.15);
      --glow-blue: 0 0 20px rgba(0, 180, 216, 0.1);
      --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* -- Scanline overlay -- */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      z-index: 9999;
    }

    /* -- Grid background -- */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(57, 255, 110, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 110, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    /* -- Layout -- */
    .wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* -- Hero -- */
    .hero {
      text-align: center;
      padding: 2rem 0 3rem;
    }

    .hero img {
      max-width: 100%;
      width: 640px;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 30px rgba(57, 255, 110, 0.2));
    }

    .hero-tagline {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 540px;
      margin: 0 auto;
    }

    /* -- Nav bar -- */
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 0 2.5rem;
      flex-wrap: wrap;
    }

    .nav-bar a {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent-green);
      text-decoration: none;
      font-size: 0.85rem;
      font-family: var(--font-mono);
      letter-spacing: 0.03em;
      transition: all 0.2s;
    }

    .nav-bar a:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-green-dim);
      box-shadow: var(--glow-green);
    }

    /* -- Typography -- */
    h1, h2, h3 {
      color: var(--text-heading);
      font-weight: 700;
    }

    h1 { display: none; } /* Hidden — logo serves as h1 */

    h2 {
      font-size: 1.4rem;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    h2::before {
      content: '//';
      color: var(--accent-green-dim);
      font-family: var(--font-mono);
      margin-right: 0.5rem;
      font-weight: 400;
    }

    h3 {
      font-size: 1.1rem;
      margin: 1.5rem 0 0.5rem;
      color: var(--accent-blue);
    }

    p { margin: 0.75rem 0; }

    a {
      color: var(--accent-green);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    a:hover { border-bottom-color: var(--accent-green); }

    strong { color: var(--text-heading); }

    code {
      font-family: var(--font-mono);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
      color: var(--accent-green);
    }

    pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
      box-shadow: var(--glow-blue);
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text-primary);
    }

    /* -- Tables -- */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 0.6rem 0.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--accent-green);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
    }

    tr:hover td {
      background: var(--bg-card);
    }

    /* -- Lists -- */
    ul, ol {
      margin: 0.5rem 0 0.5rem 1.5rem;
    }

    li {
      margin: 0.3rem 0;
    }

    li::marker {
      color: var(--accent-green-dim);
    }

    /* -- Horizontal rules -- */
    hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 2rem 0;
    }

    /* -- Footer -- */
    .footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .footer a {
      color: var(--text-secondary);
    }

    /* -- Responsive -- */
    @media (max-width: 640px) {
      .wrapper { padding: 1rem; }
      .hero img { width: 100%; }
      h2 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    {{ content }}

    <div class="footer">
      <p>personafix is open source under MIT and Apache 2.0</p>
      <p>Shadowrun is a registered trademark of The Topps Company, Inc. This is a fan project.</p>
    </div>
  </div>
</body>
</html>
